# tollbooth.config.nanopayments.yaml
#
# E2E test configuration for Circle Nanopayments on Base Sepolia testnet.
#
# Required env vars (loaded from .env.test):
#   TEST_GATEWAY_ADDRESS — the wallet address that receives USDC payments
#
# Start tollbooth:
#   bun run --env-file=.env.test src/cli.ts start --config=examples/tollbooth.config.nanopayments.yaml
#
# Then run the e2e test:
#   bun run --env-file=.env.test examples/e2e-nanopayment.ts

gateway:
  port: 3000
  discovery: true

wallets:
  base-sepolia: "${TEST_GATEWAY_ADDRESS}"

accepts:
  - asset: USDC
    network: base-sepolia

defaults:
  price: "$0.001"  # 1000 USDC micro-units — cheap for testnet
  timeout: 345600  # 4 days — Circle Gateway batches settlements asynchronously

settlement:
  strategy: nanopayments
  network: testnet

upstreams:
  dummy:
    url: "http://localhost:4000"

routes:
  "GET /weather":
    upstream: dummy
    path: "/weather"
    price: "$0.001"
